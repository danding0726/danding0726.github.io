---
layout: default
---

<article class="posts">
  
  <h1>{{ page.title }}</h1>

  <div clsss="meta">
    <span class="date">
      {{ page.date | date: "%Y-%m-%d" }}
    </span>

    <ul class="tag">
      {% for tag in page.tags %}
      <li>
        <a href="{{ site.url }}{{ site.baseurl }}/tags#{{ tag }}">
          {{ tag }}
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>

  <div class="reading-mode-bar">
    <span class="label">阅读模式</span>
    <button id="mode-blog" type="button">暗色·博客版</button>
    <button id="mode-deep" type="button">亮色·研读版</button>
  </div>

  <div class="entry post-entry">
    {{ content }}
  </div>

  {% include disqus.html %}
  {% include gitalk.html %}
</article>

<div class="pagination">
  {% if page.previous.url %}
    <span class="prev" >
      <a href="{{ site.url }}{{ site.baseurl }}{{ page.previous.url }}">
        ← 上一篇
      </a>
    </span>
  {% endif %}
  {% if page.next.url %}
    <span class="next" >
      <a href="{{ site.url }}{{ site.baseurl }}{{ page.next.url }}">
        下一篇 →
      </a>
    </span>
  {% endif %}
</div>

<script>
(function () {
  const body = document.body;
  const btnBlog = document.getElementById('mode-blog');
  const btnDeep = document.getElementById('mode-deep');
  if (!btnBlog || !btnDeep) return;

  function applyMode(mode) {
    body.classList.remove('reading-blog', 'reading-deep', 'theme-light', 'theme-dark');
    if (mode === 'deep') {
      body.classList.add('reading-deep', 'theme-light');
      btnDeep.classList.add('active');
      btnBlog.classList.remove('active');
    } else {
      body.classList.add('reading-blog', 'theme-dark');
      btnBlog.classList.add('active');
      btnDeep.classList.remove('active');
    }
    localStorage.setItem('readingMode', mode);
  }

  const saved = localStorage.getItem('readingMode');
  if (saved === 'blog' || saved === 'deep') {
    applyMode(saved);
  } else {
    const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
    applyMode(prefersLight ? 'deep' : 'blog');
  }

  btnBlog.addEventListener('click', () => applyMode('blog'));
  btnDeep.addEventListener('click', () => applyMode('deep'));
})();
</script>
